linters:
  disable-all: true
  enable:
    - gofmt
    - gosimple
    - govet
    - staticcheck
    - errcheck
    - ineffassign
    - unused

linters-settings:
  gofmt:
    simplify: true

  gosimple:
    checks: ["all"]

  staticcheck:
    checks: ["all"]

  errcheck:
    check-type-assertions: true
    check-blank: true

run:
  timeout: 5m
