linters:
  disable-all: true
  enable:
    - gofmt
    - misspell
    - goconst
    - gosimple
    - govet
    - staticcheck
    - errcheck
    - ineffassign
    - unused
    - gocyclo
    - unconvert
    - gosec
    - revive
    - gocritic
    - prealloc
    - testifylint

linters-settings:
  gofmt:
    simplify: true

  misspell:
    locale: US

  goconst:
    min-len: 2
    min-occurrences: 2

  gosimple:
    checks: ["all"]

  staticcheck:
    checks: ["all"]

  errcheck:
    check-type-assertions: true
    check-blank: true

  gocyclo:
    min-complexity: 15

  revive:
    enable-all-rules: true

  testifylint:
    enable-all: true

issues:
  exclude-dirs:
    - docker
    - storage

run:
  timeout: 5m
