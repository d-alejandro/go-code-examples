name: order-creation-management-server

services:
  go-app:
    container_name: go-app-container
    build:
      args:
        HTTP_PORT: ${APP_HTTP_PORT}
        TZ: ${APP_TIME_ZONE}
      context: .
      dockerfile: ./docker/dockerfile
    volumes:
      - ./storage/logs:/usr/app/storage/logs
    working_dir: /usr/app
    env_file: .env
    ports:
      - ${APP_HTTP_PORT_PUBLIC}:${APP_HTTP_PORT}
    depends_on:
      db:
        condition: service_healthy

  db:
    container_name: db-container
    image: postgres:17.0
    restart: always
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s
      start_interval: 5s
    volumes:
      - ./storage/docker/.postgres/data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - ${DB_PORT_PUBLIC}:5432
