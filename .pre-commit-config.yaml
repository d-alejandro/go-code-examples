repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml

  - repo: local
    hooks:
      - id: go-lint
        exclude: |
          (?x)^(
              cmd/tools/goose-custom|
              docker|
              storage
          )
        name: go-lint
        language: script
        entry: run-golint.sh
        files: \.go$

  - repo: https://github.com/dnephin/pre-commit-golang
    rev: v0.5.1
    hooks:
      - id: go-imports
        exclude: '^(docker|storage)'

  - repo: https://github.com/golangci/golangci-lint
    rev: v1.61.0
    hooks:
      - id: golangci-lint
